<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | Oliver Smokes</title>
    <link rel="stylesheet" href="{{ '/css/style.css' | relative_url }}">
</head>
<body>

    <header>
        <nav>
            <a href="/">Home</a>
            <a href="/blog">Reviews</a>
            <a href="/contact">Contact</a> </nav>
        </nav>
    </header>

    <main>
        {{ content }}
    </main>

    <footer class="legal-footer">
        <div class="warning-box">
            <strong>SURGEON GENERAL WARNING:</strong> Cigar smoking can cause cancers of the mouth and throat, even if you do not inhale. This site is intended for adults 21+ only.
        </div>
        <p>&copy; 2026 Oliver Smokes. <a href="/privacy">Privacy Policy</a></p>
    </footer>

    <script>
// The "Bouncer" Logic
document.addEventListener("DOMContentLoaded", function() {
    // 1. Check if the user has already shown their ID
    const isVerified = localStorage.getItem("age-verified");

    // 2. If they haven't been verified yet, ask the question
    if (!isVerified) {
        const userConfirmed = confirm("Welcome to Oliver Smokes. You must be 21+ to enter this site. Are you at least 21 years of age?");
        
        if (userConfirmed) {
            // 3. If they say yes, remember them for next time
            localStorage.setItem("age-verified", "true");
        } else {
            // 4. If they say no, send them to Google
            window.location.href = "https://www.google.com";
        }
    }
});
</script>

    </body>
</html>
