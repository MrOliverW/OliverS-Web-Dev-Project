    })(window,document,'script','dataLayer','GTM-5Q97KP5G');</script>

    <footer class="legal-footer">
        <div class="warning-box">
            <strong>SURGEON GENERAL WARNING:</strong> Cigar smoking can cause cancers of the mouth and throat. This site is intended for adults 21+ only.
        </div>

    </footer>

    <script>
    document.addEventListener("DOMContentLoaded", function() {
        const isVerified = localStorage.getItem("age-verified");

        if (!isVerified) {
            const userConfirmed = confirm("Welcome to Oliver Smokes. You must be 21+ to enter this site. Are you at least 21 years of age?");
            
            // Standard dataLayer push for GTM to listen to
            window.dataLayer = window.dataLayer || [];

            if (userConfirmed) {
                localStorage.setItem("age-verified", "true");
                // TRACKING: Successful age gate pass
                window.dataLayer.push({
                    'event': 'age_verification',
                    'action': 'pass'
                });
            } else {
                // TRACKING: Failed age gate
                window.dataLayer.push({
                    'event': 'age_verification',
                    'action': 'fail'
                });
                window.location.href = "https://www.google.com";
            }
        }
    });
    </script>
</body>
