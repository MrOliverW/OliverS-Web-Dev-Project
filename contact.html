---
layout: default
title: Contact the Lounge
---

<section id="contact">
    <div class="form-container">
        <h1>Get in Touch</h1>
        <p>Whether it's a review request or a business inquiry, the humidor is always open.</p>

        <form action="https://formspree.io/f/maqaawgb" method="POST">
            <input type="hidden" name="_next" value="https://oliversmokes.com/thanks.html">
            
            <div class="input-group">
                <label for="full-name">Name</label>
                <input type="text" name="name" id="full-name" placeholder="Your Name" required>
            </div>

            <div class="input-group">
                <label for="email-address">Email Address</label>
                <input type="email" name="_replyto" id="email-address" placeholder="email@example.com" required>
            </div>

            <div class="input-group">
                <label for="cigar">Cigar Brand/Blend</label>
                <input type="text" name="cigar" id="cigar" placeholder="e.g. Arturo Fuente OpusX">
            </div>

            <div class="input-group">
                <label for="message">Message</label>
                <textarea rows="6" name="message" id="message" placeholder="Type your message here..." required></textarea>
            </div>

            <input type="text" name="_gotcha" style="display:none">
            <button type="submit" class="submit-btn">Send Message</button>
        </form>
    </div>
</section>
