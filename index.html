<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliver Smokes | Cigar Reviews</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <nav>
            <strong>Oliver Smokes</strong>
            <a href="/blog/">Blog</a>
            <a href="#about">About</a>
            <a href="#contact" class="cta">Contact</a>
        </nav>
    </header>

    <main>
        <section class="hero">
            <h1>Oliver Smokes, well tempered cigar reviews.</h1>
            <p>Hear it straight from the horse's mouth.</p>
        </section>

        <section id="contact">
            <h2>Submit a Review Request</h2>
            <p>Have a stick you want me to smoke and review? Drop the details below.</p>
            
            <form action="https://formspree.io/f/YOUR_ID_HERE" method="POST">
                <label>Name</label>
                <input type="text" name="name" required>
                
                <label>Email Address</label>
                <input type="email" name="_replyto" required>
                
                <label>Cigar Brand & Blend</label>
                <input type="text" name="cigar_details">
                
                <label>Message</label>
                <textarea name="message" rows="5" required></textarea>
                
                <input type="text" name="_gotcha" style="display:none">
                
                <button type="submit">Stick it to the Man</button>
            </form>
        </section>
    </main>
</body>
</html>
